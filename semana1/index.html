
<div style="background:transparent;border-radius:16px;overflow:hidden;user-select:none;">
<canvas id="cs" style="display:block;width:100%;cursor:pointer;background:transparent;"></canvas>
<div id="panel" style="display:none;padding:18px 22px;background:rgba(8,8,28,0.88);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid rgba(255,255,255,0.1);border-radius:0 0 16px 16px;">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
    <div id="pdot" style="width:13px;height:13px;border-radius:50%;flex-shrink:0;"></div>
    <span id="ptitle" style="font-size:15px;font-weight:500;color:#fff;font-family:sans-serif;"></span>
    <button onclick="document.getElementById('panel').style.display='none';window._sel=-1;" style="margin-left:auto;background:rgba(255,255,255,0.1);border:none;color:#bbb;width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:12px;">&#x2715;</button>
  </div>
  <p id="pdesc" style="font-size:12px;color:#ccd;line-height:1.65;margin:0 0 12px;font-family:sans-serif;"></p>
  <div id="ptags" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
</div>
</div>

<script>
(function(){

const C = document.getElementById('cs');
const ctx = C.getContext('2d');
const DPR = window.devicePixelRatio || 1;
const W = 680, H = 460;
C.width = W*DPR; C.height = H*DPR;
C.style.height = (H * C.offsetWidth / W) + 'px';
ctx.scale(DPR, DPR);

window._sel = -1;

/* ── Three separate spheres laid out side by side ── */
const spheres = [
  {
    label:'Sistema Operativo', sub:'Nucleo y gestion de recursos',
    cx:160, cy:220, r:110,
    base:'#0C447C', mid:'#185FA5', light:'#378ADD', spec:'#85B7EB', hi:'#B5D4F4',
    tags:['Kernel','Shell','Drivers','FS','Scheduler'],
    desc:'El S.O. actua como arbitro entre hardware y aplicaciones. Gestiona memoria, procesos y dispositivos ofreciendo una interfaz que abstrae la complejidad del hardware subyacente.',
    vx:0.18, vy:0.12, floatAmp:6, floatSpeed:0.018, floatOff:0,
  },
  {
    label:'Aplicaciones', sub:'Navegador, editor y juegos',
    cx:340, cy:230, r:88,
    base:'#085041', mid:'#0F6E56', light:'#1D9E75', spec:'#5DCAA5', hi:'#9FE1CB',
    tags:['Navegador','Editor','Juegos','IDE','Multimedia'],
    desc:'Las aplicaciones corren sobre el S.O. y se comunican mediante syscalls para acceder a recursos. Transforman las necesidades del usuario en operaciones del sistema.',
    vx:-0.14, vy:0.16, floatAmp:8, floatSpeed:0.022, floatOff:1.4,
  },
  {
    label:'Usuario', sub:'Interaccion directa',
    cx:520, cy:215, r:70,
    base:'#633806', mid:'#854F0B', light:'#BA7517', spec:'#EF9F27', hi:'#FAC775',
    tags:['GUI','CLI','Touch','Voz','Gestos'],
    desc:'El usuario es la capa exterior. Interactua con aplicaciones mediante interfaces graficas o comandos. Cada accion fluye hacia las capas internas del sistema.',
    vx:0.20, vy:-0.13, floatAmp:5, floatSpeed:0.016, floatOff:2.8,
  },
];

let t = 0;
let ripples = [];
let hov = -1;

/* floating offsets per sphere */
const floatT = [0, 1.4, 2.8];

function hA(hex, a){
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function drawSphere(s, isHov, isSel){
  const sc = isSel ? 1.13 : isHov ? 1.07 : 1.0;
  const sr = s.r * sc;
  const fy = Math.sin(t * s.floatSpeed + s.floatOff) * s.floatAmp;
  const lx = s.cx, ly = s.cy + fy;

  /* drop shadow */
  ctx.save();
  ctx.translate(lx, ly + sr * 0.88);
  ctx.beginPath(); ctx.ellipse(0, 8, sr*0.62, sr*0.14, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.25)'; ctx.fill();
  ctx.restore();

  ctx.save(); ctx.translate(lx, ly);

  /* outer glow when active */
  if(isHov || isSel){
    const g = ctx.createRadialGradient(0,0,sr*0.6,0,0,sr*1.55);
    g.addColorStop(0, hA(s.spec, 0.38));
    g.addColorStop(1, hA(s.spec, 0));
    ctx.beginPath(); ctx.arc(0,0,sr*1.55,0,Math.PI*2);
    ctx.fillStyle=g; ctx.fill();
  }

  /* base gradient — 3-D illusion */
  const gb = ctx.createRadialGradient(-sr*0.3,-sr*0.34,sr*0.04, 0,0,sr);
  gb.addColorStop(0,   s.hi);
  gb.addColorStop(0.20, s.spec);
  gb.addColorStop(0.55, s.light);
  gb.addColorStop(0.80, s.mid);
  gb.addColorStop(1,    s.base);
  ctx.beginPath(); ctx.arc(0,0,sr,0,Math.PI*2);
  ctx.fillStyle=gb; ctx.fill();

  /* dark bottom shadow */
  const gs = ctx.createRadialGradient(sr*0.18,sr*0.38,0, 0,0,sr);
  gs.addColorStop(0,  hA('#000000',0.38));
  gs.addColorStop(0.5,hA('#000000',0.10));
  gs.addColorStop(1,  hA('#000000',0));
  ctx.beginPath(); ctx.arc(0,0,sr,0,Math.PI*2);
  ctx.fillStyle=gs; ctx.fill();

  /* large diffuse highlight */
  const gh = ctx.createRadialGradient(-sr*0.31,-sr*0.36,0, -sr*0.31,-sr*0.36,sr*0.54);
  gh.addColorStop(0,   hA('#ffffff',0.86));
  gh.addColorStop(0.35,hA('#ffffff',0.20));
  gh.addColorStop(1,   hA('#ffffff',0));
  ctx.beginPath(); ctx.arc(0,0,sr,0,Math.PI*2);
  ctx.fillStyle=gh; ctx.fill();

  /* tiny specular hot-spot */
  const gspot = ctx.createRadialGradient(-sr*0.37,-sr*0.43,0, -sr*0.37,-sr*0.43,sr*0.15);
  gspot.addColorStop(0, hA('#ffffff',0.97));
  gspot.addColorStop(1, hA('#ffffff',0));
  ctx.beginPath(); ctx.arc(0,0,sr,0,Math.PI*2);
  ctx.fillStyle=gspot; ctx.fill();

  /* rim light bottom-right */
  const grim = ctx.createRadialGradient(sr*0.42,sr*0.46,sr*0.44, 0,0,sr);
  grim.addColorStop(0, hA(s.spec, 0.52));
  grim.addColorStop(1, hA(s.spec, 0));
  ctx.beginPath(); ctx.arc(0,0,sr,0,Math.PI*2);
  ctx.fillStyle=grim; ctx.fill();

  ctx.restore();

  /* label pill */
  ctx.save();
  const yTop = ly - sr - 8;
  ctx.font = '500 13px sans-serif';
  const tw = Math.max(ctx.measureText(s.label).width + 28, ctx.measureText(s.sub).width + 22);
  const ph=40, px=lx-tw/2, py=yTop-ph-2;
  ctx.fillStyle='rgba(4,4,18,0.65)';
  ctx.beginPath();
  if(ctx.roundRect){ ctx.roundRect(px,py,tw,ph,7); } else { ctx.rect(px,py,tw,ph); }
  ctx.fill();
  ctx.strokeStyle=hA(s.spec,0.4); ctx.lineWidth=0.8; ctx.stroke();
  ctx.textAlign='center'; ctx.fillStyle='#ffffff';
  ctx.font='500 13px sans-serif'; ctx.fillText(s.label, lx, py+16);
  ctx.font='11px sans-serif'; ctx.fillStyle=s.hi;
  ctx.fillText(s.sub, lx, py+31);
  ctx.restore();
}

function drawConnectors(){
  if(window._sel !== -1) return;
  for(let i=0;i<spheres.length-1;i++){
    const a=spheres[i], b=spheres[i+1];
    const fy_a=Math.sin(t*a.floatSpeed+a.floatOff)*a.floatAmp;
    const fy_b=Math.sin(t*b.floatSpeed+b.floatOff)*b.floatAmp;
    const x1=a.cx+a.r, y1=a.cy+fy_a;
    const x2=b.cx-b.r, y2=b.cy+fy_b;
    ctx.save();
    ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.lineWidth=0.8;
    ctx.setLineDash([4,6]);
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    ctx.setLineDash([]);
    /* small arrow head */
    const ang=Math.atan2(y2-y1,x2-x1);
    ctx.translate(x2,y2);
    ctx.rotate(ang);
    ctx.fillStyle='rgba(255,255,255,0.22)';
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-8,-4); ctx.lineTo(-8,4); ctx.closePath(); ctx.fill();
    ctx.restore();
  }
}

function drawRipples(){
  ripples = ripples.filter(rp=>{
    rp.t += 0.028;
    const prog = 1-Math.pow(1-rp.t,3);
    const cr = rp.maxR*prog, a=(1-prog)*0.7;
    ctx.beginPath(); ctx.arc(rp.x,rp.y,cr,0,Math.PI*2);
    ctx.strokeStyle=hA(rp.color,a); ctx.lineWidth=2.5*(1-prog)+0.5; ctx.stroke();
    /* second ring slightly delayed */
    if(rp.t>0.25){
      const prog2=1-Math.pow(1-(rp.t-0.25),3);
      const cr2=rp.maxR*prog2*0.7, a2=(1-prog2)*0.5;
      ctx.beginPath(); ctx.arc(rp.x,rp.y,cr2,0,Math.PI*2);
      ctx.strokeStyle=hA(rp.color,a2); ctx.lineWidth=1.5*(1-prog2); ctx.stroke();
    }
    return rp.t < 1;
  });
}

function drawHint(){
  ctx.save();
  ctx.globalAlpha = 0.4+0.12*Math.sin(t*0.04);
  ctx.font='12px sans-serif'; ctx.fillStyle='rgba(200,200,240,1)'; ctx.textAlign='center';
  ctx.fillText('Toca una esfera para explorarla', W/2, H-12);
  ctx.restore();
}

function draw(){
  ctx.clearRect(0,0,W,H);
  t++;

  drawConnectors();

  spheres.forEach((s,i)=>{
    drawSphere(s, hov===i, window._sel===i);
  });

  drawRipples();
  drawHint();
  requestAnimationFrame(draw);
}

function getHit(mx,my){
  /* check smallest sphere first so inner ones win when overlapping */
  for(let i=spheres.length-1;i>=0;i--){
    const s=spheres[i];
    const fy=Math.sin(t*s.floatSpeed+s.floatOff)*s.floatAmp;
    const dx=mx-s.cx, dy=my-(s.cy+fy);
    if(dx*dx+dy*dy <= s.r*s.r) return i;
  }
  return -1;
}

function getCoords(e){
  const rect=C.getBoundingClientRect();
  return {
    mx:(e.clientX-rect.left)*(W/rect.width),
    my:(e.clientY-rect.top)*(H/rect.height)
  };
}

C.addEventListener('mousemove',e=>{
  const {mx,my}=getCoords(e);
  hov=getHit(mx,my);
  C.style.cursor=hov>=0?'pointer':'default';
});
C.addEventListener('mouseleave',()=>{ hov=-1; C.style.cursor='default'; });

function doClick(mx,my){
  const h=getHit(mx,my);
  if(h>=0){
    const s=spheres[h];
    const fy=Math.sin(t*s.floatSpeed+s.floatOff)*s.floatAmp;
    window._sel=h;
    ripples.push({x:s.cx, y:s.cy+fy, maxR:s.r*2.2, color:s.spec, t:0});
    showPanel(h);
  }
}

C.addEventListener('click',e=>{ const {mx,my}=getCoords(e); doClick(mx,my); });
C.addEventListener('touchend',e=>{
  e.preventDefault();
  const rect=C.getBoundingClientRect(), touch=e.changedTouches[0];
  doClick((touch.clientX-rect.left)*(W/rect.width),(touch.clientY-rect.top)*(H/rect.height));
},{passive:false});

function hA2(hex,a){ return hA(hex,a); }

function showPanel(i){
  const s=spheres[i];
  const dot=document.getElementById('pdot');
  dot.style.background=s.spec; dot.style.boxShadow='0 0 7px '+s.spec;
  document.getElementById('ptitle').textContent=s.label;
  document.getElementById('ptitle').style.color=s.hi;
  document.getElementById('pdesc').textContent=s.desc;
  const tagsEl=document.getElementById('ptags'); tagsEl.innerHTML='';
  s.tags.forEach(tag=>{
    const sp=document.createElement('span');
    sp.textContent=tag;
    sp.style.cssText=`background:${hA(s.base,0.8)};color:${s.hi};font-size:11px;padding:3px 9px;border-radius:20px;font-family:sans-serif;border:1px solid ${hA(s.spec,0.45)};`;
    tagsEl.appendChild(sp);
  });
  const panel=document.getElementById('panel');
  panel.style.display='block';
  panel.style.animation='none'; void panel.offsetHeight;
  panel.style.animation='sIn .3s ease';
}

const st=document.createElement('style');
st.textContent='@keyframes sIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}';
document.head.appendChild(st);

draw();
window.addEventListener('resize',()=>{ C.style.height=(H*C.offsetWidth/W)+'px'; });
})();
</script>
