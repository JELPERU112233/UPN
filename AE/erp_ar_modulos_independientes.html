
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
#erp-root { background: #000; font-family: 'Courier New', monospace; position: relative; overflow: hidden; }
#canvas-wrap { position: relative; width: 100%; height: 680px; }
svg#erp-svg { display: block; width: 100%; height: 100%; cursor: default; }
#info-panel { background: rgba(0,255,180,0.06); border: 1px solid #00ffb4; border-radius: 10px; padding: 14px 18px; margin: 0 12px 10px; min-height: 90px; transition: all 0.3s; }
#info-title { font-size: 13px; font-weight: bold; color: #00ffb4; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; text-shadow: 0 0 8px #00ffb4; }
#info-desc { font-size: 12px; color: #a0ffd8; line-height: 1.6; }
#btn-all { display: block; margin: 0 12px 10px; padding: 9px 20px; background: transparent; border: 1px solid #00ffb4; border-radius: 8px; color: #00ffb4; font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 2px; cursor: pointer; text-transform: uppercase; transition: all 0.3s; }
#btn-all:hover { background: rgba(0,255,180,0.1); }
#btn-all:disabled { opacity: 0.35; cursor: not-allowed; }
#hint { font-family: 'Courier New', monospace; font-size: 10px; color: #336655; text-align: center; padding: 4px 0 8px; letter-spacing: 1px; }
.scan { position: absolute; left:0; width:100%; height:2px; background: linear-gradient(transparent, rgba(0,255,180,0.15), transparent); animation: scanline 4s linear infinite; pointer-events: none; }
@keyframes scanline { 0%{top:-2px} 100%{top:100%} }
.ar-c { position: absolute; width:16px; height:16px; }
.ar-c.tl{top:5px;left:5px;border-top:1px solid #00ffb4;border-left:1px solid #00ffb4;}
.ar-c.tr{top:5px;right:5px;border-top:1px solid #00ffb4;border-right:1px solid #00ffb4;}
.ar-c.bl{bottom:5px;left:5px;border-bottom:1px solid #00ffb4;border-left:1px solid #00ffb4;}
.ar-c.br{bottom:5px;right:5px;border-bottom:1px solid #00ffb4;border-right:1px solid #00ffb4;}
@keyframes rspin { from{transform-origin:450px 340px;transform:rotate(0deg)} to{transform-origin:450px 340px;transform:rotate(360deg)} }
@keyframes rspin2 { from{transform-origin:450px 340px;transform:rotate(0deg)} to{transform-origin:450px 340px;transform:rotate(-360deg)} }
#ring1{animation:rspin 9s linear infinite;}
#ring2{animation:rspin2 13s linear infinite;}
@keyframes gspin { from{transform-origin:425px 356px;transform:rotate(0deg)} to{transform-origin:425px 356px;transform:rotate(360deg)} }
#gear-icon{animation:gspin 6s linear infinite;}
</style>

<script>
const modData = [
  { name:"VENTAS Y MARKETING", color:"#00ff64",
    desc:"El cliente realiza un PEDIDO → el ERP registra cliente, producto, cantidad, precio, fecha entrega → dispara validación de crédito en Finanzas y verificación de stock en Inventario. Sin ERP: llamadas en cadena, datos desactualizados, errores manuales." },
  { name:"FINANZAS Y CONTABILIDAD", color:"#00c8ff",
    desc:"Recibe el pedido de Ventas → verifica límite de crédito → aprueba o rechaza automáticamente → genera factura proforma → actualiza cuentas por cobrar en tiempo real. Sin ERP: el contador recibe la factura 3 días después por correo." },
  { name:"RECURSOS HUMANOS", color:"#b400ff",
    desc:"Producción detecta necesidad de 5 operadores extra → RRHH verifica disponibilidad → programa horas extra → actualiza nómina → registra en control de asistencia. Integración bidireccional con el módulo de Producción." },
  { name:"COMPRAS Y ABASTECIMIENTO", color:"#ffc800",
    desc:"Inventario detecta stock bajo → genera automáticamente Orden de Compra al proveedor → Compras negocia precio → Finanzas aprueba el gasto → el proveedor recibe la OC electrónicamente. Sin ERP: 2 semanas de coordinación manual." },
  { name:"PRODUCCIÓN Y MANUFACTURA", color:"#ff6400",
    desc:"Se genera automáticamente la Orden de Trabajo: materiales necesarios (MRP), máquinas disponibles, operadores asignados (RRHH), fecha compromiso. Controla el avance en tiempo real y actualiza el estado del pedido del cliente." },
  { name:"LOGÍSTICA Y DISTRIBUCIÓN", color:"#00ffff",
    desc:"Producción termina el pedido → Logística recibe aviso automático → asigna transportista → genera guía de remisión → actualiza tracking en tiempo real → el cliente recibe notificación automática. Trazabilidad completa." },
  { name:"CRM / POST-VENTA", color:"#ff32b4",
    desc:"El pedido se entregó → CRM registra satisfacción → activa encuesta automática → si hay reclamo, genera ticket de soporte → vincula con garantía del producto → alimenta el historial del cliente para futuras ofertas personalizadas." },
  { name:"INVENTARIO Y ALMACÉN", color:"#ffff00",
    desc:"Monitorea stock en tiempo real por ubicación, lote y número de serie → actualiza al recibir mercadería o despachar pedidos → alerta puntos de reorden → genera movimientos contables automáticos en Finanzas." },
  { name:"GESTIÓN DE PROYECTOS", color:"#96ff32",
    desc:"Pedidos especiales generan automáticamente un proyecto con presupuesto (Finanzas), recursos humanos (RRHH), materiales (Compras) y cronograma integrado. El avance del proyecto actualiza el estado del pedido en tiempo real." },
  { name:"BI Y BIG DATA", color:"#ff9600",
    desc:"Todos los eventos del ERP se almacenan y analizan → dashboards en tiempo real: margen por producto, rentabilidad por cliente, proyección de demanda → detecta tendencias → emite alertas predictivas antes de que ocurran los problemas." },
  { name:"CADENA DE SUMINISTRO", color:"#00ff96",
    desc:"Visión end-to-end desde el proveedor hasta el cliente final. Optimiza: punto de reorden, lote económico, lead times de proveedores y niveles de seguridad. Anticipa quiebres de stock usando historial de ventas y demanda proyectada." }
];

let globalRunning = false;

function hexToRgb(h) {
  return parseInt(h.slice(1,3),16)+','+parseInt(h.slice(3,5),16)+','+parseInt(h.slice(5,7),16);
}

function resetRect(idx) {
  const r = document.getElementById('rect-'+idx);
  const mod = modData[idx];
  if (r) { r.setAttribute('fill','rgba(0,0,0,0.02)'); r.setAttribute('stroke-width','1'); r.setAttribute('stroke', mod.color); }
  const btn = document.getElementById('btn-'+idx);
  const btxt = document.getElementById('btxt-'+idx);
  if (btn) { btn.setAttribute('fill','rgba('+hexToRgb(mod.color)+',0.1)'); }
  if (btxt) btxt.textContent = '▶ EJECUTAR';
}

function highlightRect(idx) {
  const r = document.getElementById('rect-'+idx);
  const mod = modData[idx];
  if (r) { r.setAttribute('fill','rgba('+hexToRgb(mod.color)+',0.18)'); r.setAttribute('stroke-width','2.5'); }
  const btn = document.getElementById('btn-'+idx);
  if (btn) btn.setAttribute('fill','rgba('+hexToRgb(mod.color)+',0.28)');
}

function showInfo(idx) {
  const mod = modData[idx];
  document.getElementById('info-title').style.color = mod.color;
  document.getElementById('info-title').style.textShadow = '0 0 8px '+mod.color;
  document.getElementById('info-title').textContent = '[ '+mod.name+' ]';
  document.getElementById('info-desc').textContent = mod.desc;
}

function animateLine(idx, onDone) {
  const line = document.getElementById('line-'+idx);
  if (!line) { if(onDone) onDone(); return; }
  const x1=parseFloat(line.getAttribute('x1')), y1=parseFloat(line.getAttribute('y1'));
  const x2=parseFloat(line.getAttribute('x2')), y2=parseFloat(line.getAttribute('y2'));
  const color = modData[idx].color;
  line.setAttribute('stroke', color); line.setAttribute('stroke-width','2');
  const ns='http://www.w3.org/2000/svg', steps=18; let s=0;
  const iv = setInterval(()=>{
    const t=s/steps, cx=x1+(x2-x1)*t, cy=y1+(y2-y1)*t;
    const dot=document.createElementNS(ns,'circle');
    dot.setAttribute('cx',cx); dot.setAttribute('cy',cy);
    dot.setAttribute('r','3'); dot.setAttribute('fill',color); dot.setAttribute('opacity','0.9');
    document.getElementById('particles').appendChild(dot);
    setTimeout(()=>dot.remove(), 700);
    s++; if(s>steps){ clearInterval(iv); setTimeout(()=>{ line.setAttribute('stroke','#1a4433'); line.setAttribute('stroke-width','1'); if(onDone) onDone(); },600); }
  }, 60);
}

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

async function runSingle(idx) {
  if (globalRunning) return;
  const btxt = document.getElementById('btxt-'+idx);
  // reset todos
  for(let i=0;i<11;i++) resetRect(i);
  highlightRect(idx);
  showInfo(idx);
  if (btxt) btxt.textContent = '⏳ PROCESANDO';
  animateLine(idx, ()=>{
    if (btxt) btxt.textContent = '✔ LISTO';
    setTimeout(()=>{ if(btxt) btxt.textContent='▶ EJECUTAR'; }, 2000);
  });
}

async function runERP() {
  if (globalRunning) return;
  globalRunning = true;
  document.getElementById('btn-all').disabled = true;
  for(let i=0;i<11;i++) resetRect(i);
  const seq=[0,1,7,3,4,2,5,6,9,8,10];
  for(let si=0;si<seq.length;si++){
    const idx=seq[si];
    for(let i=0;i<11;i++) resetRect(i);
    highlightRect(idx);
    showInfo(idx);
    const btxt=document.getElementById('btxt-'+idx);
    if(btxt) btxt.textContent='⏳ PROCESANDO';
    animateLine(idx, ()=>{ if(btxt) btxt.textContent='✔ LISTO'; });
    await sleep(1500);
  }
  document.getElementById('info-title').style.color='#00ffb4';
  document.getElementById('info-title').style.textShadow='0 0 8px #00ffb4';
  document.getElementById('info-title').textContent='✅ CICLO ERP COMPLETO';
  document.getElementById('info-desc').textContent='El pedido del cliente disparó 11 módulos integrados automáticamente. Una sola base de datos central fue consultada y actualizada por todos los módulos en tiempo real — sin llamadas, sin emails, sin Excel duplicados.';
  for(let i=0;i<11;i++) { const b=document.getElementById('btxt-'+i); if(b) b.textContent='▶ EJECUTAR'; }
  globalRunning=false;
  document.getElementById('btn-all').disabled=false;
}

// Attach click handlers to each ▶ btn rect
for(let i=0;i<11;i++){
  (function(idx){
    const btn=document.getElementById('btn-'+idx);
    if(btn) btn.addEventListener('click', ()=>runSingle(idx));
    const btxt=document.getElementById('btxt-'+idx);
    if(btxt) btxt.addEventListener('click', ()=>runSingle(idx));
  })(i);
}
document.getElementById('btn-all').addEventListener('click', runERP);
</script>
