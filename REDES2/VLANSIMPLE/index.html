<title>Simulador VLAN — Catalyst 2960</title>
<style>
/* ── Reset y fondo negro ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: #000000;
  min-height: 100vh;
  padding: 20px;
  font-family: monospace;
}

/* ── Variables de color (modo oscuro fijo) ── */
:root {
  --color-background-primary:   #0d1117;
  --color-background-secondary: #161b22;
  --color-background-tertiary:  #000000;
  --color-text-primary:         #c9d1d9;
  --color-text-secondary:       #8b949e;
  --color-border-tertiary:      rgba(255,255,255,0.10);
  --color-border-secondary:     rgba(255,255,255,0.20);
  --font-sans: monospace;
  --font-mono: monospace;
  --border-radius-md: 6px;
  --border-radius-lg: 10px;
}

@keyframes dash { to { stroke-dashoffset: -18; } }
.cable { stroke-dasharray: 4 3; animation: dash 1s linear infinite; }
.cable.idle { animation: none; stroke-dasharray: none; opacity: 0.3; }
.pc-g { cursor: pointer; }
.pc-g:hover .pc-body { opacity: 0.8; }
.port-g { cursor: pointer; }
.port-g:hover rect { opacity: 0.75; }

select, button {
  font-family: monospace;
  font-size: 11px;
  background: #161b22;
  color: #c9d1d9;
  border: 0.5px solid rgba(255,255,255,0.20);
  border-radius: 4px;
  padding: 5px 8px;
  width: 100%;
  box-sizing: border-box;
  cursor: pointer;
}
button { width: auto; padding: 5px 14px; }
label {
  font-family: monospace;
  font-size: 10px;
  color: #8b949e;
  display: block;
  margin-bottom: 3px;
}

/* ── Wrapper principal ── */
.wrapper {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  background: #000000;
  border-radius: 12px;
  padding: 12px;
}

/* ── SVG container: reducido 20% via transform ── */
.svg-container {
  flex: 1;
  min-width: 0;
  transform-origin: top left;
  transform: scale(0.80);
  /* compensar el espacio que deja el scale */
  width: 125%;          /* 1/0.8 = 1.25 para que el flex no colapsa */
  margin-bottom: -20%;  /* recortar el espacio vacío inferior */
}

/* ── Panel derecho ── */
.side-panel {
  width: 200px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-top: 8px;
}
.side-card {
  background: #161b22;
  border: 0.5px solid rgba(255,255,255,0.10);
  border-radius: 8px;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.side-label {
  font-family: monospace;
  font-size: 9px;
  color: #8b949e;
  margin-bottom: 4px;
}
.step-item {
  font-family: monospace;
  font-size: 9px;
  color: rgba(255,255,255,0.20);
  transition: color 0.2s;
}
</style>
</head>

    <div>
      <label>Origen</label>
      <select id="sel-src" onchange="updateDst()">
        <option value="1">PC-1 — VLAN 10 / Fa0/1</option>
        <option value="2">PC-2 — VLAN 10 / Fa0/2</option>
        <option value="3">PC-3 — VLAN 20 / Fa0/3</option>
        <option value="4">PC-4 — VLAN 20 / Fa0/4</option>
        <option value="5">PC-5 — VLAN 30 / Fa0/5</option>
        <option value="6">PC-6 — VLAN 30 / Fa0/6</option>
      </select>
    </div>
    <div>
      <label>Destino</label>
      <select id="sel-dst">
        <option value="2">PC-2 — VLAN 10 / Fa0/2</option>
        <option value="3">PC-3 — VLAN 20 / Fa0/3</option>
        <option value="4">PC-4 — VLAN 20 / Fa0/4</option>
        <option value="5">PC-5 — VLAN 30 / Fa0/5</option>
        <option value="6">PC-6 — VLAN 30 / Fa0/6</option>
        <option value="T">ROUTER — Trunk / Gi0/1</option>
      </select>
    </div>
    <button onclick="runFlow()" style="color:#c9d1d9;">▶ Enviar trama</button>
    <button onclick="alert('Ver comandos IOS en la guía adjunta.')" style="color:#8b949e;">Ver comandos IOS ↗</button>
  </div>

  <!-- Resultado -->
  <div class="side-card" style="min-height:70px;">
    <div class="side-label">RESULTADO</div>
    <div id="result-msg" style="font-family:monospace;font-size:10px;color:#8b949e;line-height:1.5;white-space:pre;">—</div>
  </div>

  <!-- Pasos -->
  <div class="side-card">
    <div class="side-label">PASOS</div>
    <div id="step1" class="step-item">[1] PC → puerto switch</div>
    <div id="step2" class="step-item">[2] Consulta tabla CAM</div>
    <div id="step3" class="step-item">[3] Decisión forwarding</div>
    <div id="step4" class="step-item">[4] Entrega al destino</div>
  </div>

</div>
</div>

<script>
const PCS = {
  1:{ label:'PC-1', vlan:10, port:'Fa0/1', ip:'172.16.10.1', mac:'AA:BB:CC:01:00:01', color:'#1D9E75', light:'#9FE1CB', pcx:34,  pcy:82,  swx:37,  swy:189 },
  2:{ label:'PC-2', vlan:10, port:'Fa0/2', ip:'172.16.10.2', mac:'AA:BB:CC:02:00:02', color:'#1D9E75', light:'#9FE1CB', pcx:104, pcy:82,  swx:87,  swy:189 },
  3:{ label:'PC-3', vlan:20, port:'Fa0/3', ip:'172.16.20.3', mac:'CC:DD:EE:03:00:03', color:'#378ADD', light:'#85B7EB', pcx:174, pcy:82,  swx:139, swy:189 },
  4:{ label:'PC-4', vlan:20, port:'Fa0/4', ip:'172.16.20.4', mac:'CC:DD:EE:04:00:04', color:'#378ADD', light:'#85B7EB', pcx:244, pcy:82,  swx:189, swy:189 },
  5:{ label:'PC-5', vlan:30, port:'Fa0/5', ip:'172.16.30.5', mac:'EE:FF:00:05:00:05', color:'#D85A30', light:'#F0997B', pcx:314, pcy:82,  swx:239, swy:189 },
  6:{ label:'PC-6', vlan:30, port:'Fa0/6', ip:'172.16.30.6', mac:'EE:FF:00:06:00:06', color:'#D85A30', light:'#F0997B', pcx:384, pcy:82,  swx:289, swy:189 },
  T:{ label:'ROUTER',vlan:null,port:'Gi0/1',ip:'—',mac:'FF:FF:TR:UN:K:00', color:'#7F77DD', light:'#AFA9EC', pcx:403, pcy:190, swx:355, swy:196 },
};
const BP_Y = 222;

function setStep(n, color, txt) {
  const el = document.getElementById('step'+n);
  if (!el) return;
  el.style.color = color;
  if (txt) el.textContent = txt;
}
function resetSteps() {
  const defaults = ['[1] PC → puerto switch','[2] Consulta tabla CAM','[3] Decisión forwarding','[4] Entrega al destino'];
  for(let i=1;i<=4;i++) setStep(i,'rgba(255,255,255,0.18)', defaults[i-1]);
}

function selectSrc(id) {
  if (id==='T') return;
  document.getElementById('sel-src').value = String(id);
  updateDst();
}
function updateDst() {
  const s = document.getElementById('sel-src').value;
  const d = document.getElementById('sel-dst');
  Array.from(d.options).forEach(o => o.hidden = o.value === s);
  if (d.value === s) d.selectedIndex = 0;
}

function setCable(id, color, on) {
  const c = document.getElementById('cable-'+id);
  if (!c) return;
  if (on) { c.setAttribute('stroke',color); c.setAttribute('stroke-width','2.2'); c.classList.remove('idle'); }
  else    { c.setAttribute('stroke-width','1.4'); c.classList.add('idle'); }
}
function resetCables() { [1,2,3,4,5,6,'T'].forEach(i => setCable(i,'#fff',false)); }

function updatePanel(src, dst, blocked, isTrunk) {
  document.getElementById('info-body').setAttribute('opacity','1');
  document.getElementById('info-title').setAttribute('fill','#4a5070');
  document.getElementById('info-title').textContent = `${src.label} (${src.port}) → ${dst.label} (${dst.port})`;
  document.getElementById('i-src-v').textContent = src.mac;
  document.getElementById('i-src-v').setAttribute('fill', src.light);
  document.getElementById('i-dst-v').textContent = dst.mac;
  document.getElementById('i-dst-v').setAttribute('fill', dst.light);
  document.getElementById('i-tag-v').textContent = isTrunk ? 'VLAN ID 802.1Q' : 'sin etiqueta (access)';
  document.getElementById('i-ip-v').textContent  = `${src.ip} → ${dst.ip}`;
  document.getElementById('j-1v').textContent = src.port;
  document.getElementById('j-2v').textContent = src.vlan ? `VLAN ${src.vlan}` : 'TRUNK';
  const accion = isTrunk ? 'FORWARD tagged' : blocked ? 'DESCARTE' : 'FORWARD unicast';
  const ac = blocked ? '#D85A30' : '#1D9E75';
  document.getElementById('j-3v').textContent = accion;
  document.getElementById('j-3v').setAttribute('fill', ac);
  document.getElementById('j-4v').textContent = blocked ? '— (ninguno)' : dst.port;
  document.getElementById('j-4v').setAttribute('fill', ac);
}

let busy = false;
async function runFlow() {
  if (busy) return;
  const srcId = document.getElementById('sel-src').value;
  const dstId = document.getElementById('sel-dst').value;
  const src = PCS[srcId]; const dst = PCS[dstId];
  const isTrunk = dstId === 'T';
  const blocked = !isTrunk && src.vlan !== dst.vlan;

  resetCables(); resetSteps();
  updatePanel(src, dst, blocked, isTrunk);
  busy = true;

  const pkt = document.getElementById('pkt');
  const lbl = document.getElementById('pkt-lbl');
  const res = document.getElementById('result-msg');
  res.style.color = src.color;
  res.textContent = '...';

  pkt.setAttribute('fill', src.color); pkt.setAttribute('opacity','0');

  setStep(1, src.color, `[1] ${src.label} → ${src.port}`);
  setCable(srcId, src.color, true);
  await mov(pkt, lbl, src.pcx, src.pcy, src.swx, src.swy, src.color, `V${src.vlan||'T'}`, 500);

  setStep(2, src.color, `[2] CAM lookup VLAN ${src.vlan||'T'}`);
  await mov(pkt, lbl, src.swx, src.swy, src.swx, BP_Y, src.color, 'CAM?', 280);

  if (blocked) {
    setStep(3, '#D85A30', `[3] DESCARTE — VLAN mismatch`);
    pkt.setAttribute('opacity','0'); lbl.setAttribute('opacity','0');
    res.style.color = '#D85A30';
    res.textContent = `[✘] DESCARTE\nVLAN ${src.vlan} ≠ VLAN ${dst.vlan}\nSwitch L2 no\nenruta entre VLANs`;
    setCable(srcId, src.color, false);
    busy = false; return;
  }

  const outColor = isTrunk ? '#7F77DD' : dst.color;
  const tagLbl = isTrunk ? '802.1Q' : 'fwd';
  setStep(3, outColor, `[3] → ${dst.port} ${isTrunk?'(tagged)':'same VLAN'}`);
  await mov(pkt, lbl, src.swx, BP_Y, dst.swx, dst.swy, outColor, tagLbl, 340);

  setStep(4, outColor, `[4] → ${dst.label} entregado`);
  setCable(dstId, outColor, true);
  await mov(pkt, lbl, dst.swx, dst.swy, dst.pcx, dst.pcy, outColor, dst.label, 500);

  pkt.setAttribute('opacity','0'); lbl.setAttribute('opacity','0');
  res.style.color = '#1D9E75';
  res.textContent = `[✔] OK\n${src.label} → ${dst.label}\n${isTrunk?'802.1Q Gi0/1':'VLAN '+src.vlan}`;
  setTimeout(() => { resetCables(); busy = false; }, 800);
}

function mov(pEl, lEl, x1, y1, x2, y2, color, label, dur) {
  return new Promise(res => {
    pEl.setAttribute('cx',x1); pEl.setAttribute('cy',y1);
    pEl.setAttribute('fill',color); pEl.setAttribute('opacity','1');
    lEl.setAttribute('x',x1); lEl.setAttribute('y',y1-9);
    lEl.textContent=label; lEl.setAttribute('fill',color); lEl.setAttribute('opacity','1');
    const t0 = performance.now();
    function step(now) {
      const p = Math.min((now-t0)/dur,1);
      const e = p<0.5?2*p*p:-1+(4-2*p)*p;
      const cx=x1+(x2-x1)*e, cy=y1+(y2-y1)*e;
      pEl.setAttribute('cx',cx); pEl.setAttribute('cy',cy);
      lEl.setAttribute('x',cx); lEl.setAttribute('y',cy-9);
      if(p<1) requestAnimationFrame(step); else res();
    }
    requestAnimationFrame(step);
  });
}
updateDst();
</script>
</body>
</html>
